name: peanut_doctor
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_tflite: ^1.0.1
  image_picker: ^0.8.9
  camera: ^0.11.3
  path_provider: ^2.1.5
  image_cropper: ^12.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/labels.txt
    - assets/peanut_model_optimized_v2.tflite
    - assets/app_logo.png